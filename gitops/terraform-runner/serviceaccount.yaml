apiVersion: v1
kind: ServiceAccount
metadata:
  name: terraform-runner
  namespace: gitops-system
  labels:
    app.kubernetes.io/name: terraform-runner
    app.kubernetes.io/part-of: gitops
  annotations:
    # Set this to your Azure Managed Identity client ID for Workload Identity.
    # The bootstrap layer should create a user-assigned managed identity and
    # federated credential for this service account.
    azure.workload.identity/client-id: "${AZURE_CLIENT_ID}"
