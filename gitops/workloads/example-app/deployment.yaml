# Example deployment consuming Terraform outputs from ConfigMap.
# The gitops-tf-outputs ConfigMap is created by the terraform-runner Job.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
  namespace: workloads
  labels:
    app.kubernetes.io/name: example-app
    app.kubernetes.io/part-of: gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: example-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: example-app
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
          env:
            # Example: inject TF outputs as environment variables
            - name: AZURE_STORAGE_ACCOUNT
              valueFrom:
                configMapKeyRef:
                  name: gitops-tf-outputs
                  key: storage_account_name
                  optional: true
            - name: AZURE_RESOURCE_GROUP
              valueFrom:
                configMapKeyRef:
                  name: gitops-tf-outputs
                  key: resource_group_name
                  optional: true
