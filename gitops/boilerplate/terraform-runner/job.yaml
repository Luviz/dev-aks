apiVersion: batch/v1
kind: Job
metadata:
  name: terraform-apply
  namespace: gitops-system
  labels:
    app.kubernetes.io/name: terraform-runner
    app.kubernetes.io/part-of: gitops
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: terraform-runner
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: terraform-runner
      restartPolicy: Never
      containers:
        - name: terraform
          image: hashicorp/terraform:1.9
          envFrom:
            - configMapRef:
                name: terraform-vars
          command:
            - sh
            - -c
            - |
              set -euo pipefail
              cd /workspace/terraform

              echo "==> terraform init"
              terraform init -input=false

              echo "==> terraform apply"
              terraform apply -auto-approve -input=false

              echo "==> syncing outputs to ConfigMap"
              sh /workspace/terraform/_outputs-sync.sh
          volumeMounts:
            - name: source
              mountPath: /workspace
      initContainers:
        - name: git-clone
          image: alpine/git:latest
          command:
            - sh
            - -c
            - |
              # TODO: Update repo URL and path
              git clone --depth 1 --branch main \
                https://github.com/REPLACE_ORG/REPLACE_REPO.git /workspace
          volumeMounts:
            - name: source
              mountPath: /workspace
      volumes:
        - name: source
          emptyDir: {}
