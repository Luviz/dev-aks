# Terraform CR — the terraform-operator watches this and runs plan/apply
apiVersion: tf.galleybytes.com/v1beta1
kind: Terraform
metadata:
  name: gitops-infra
  namespace: gitops-system
  labels:
    app.kubernetes.io/name: gitops-infra
    app.kubernetes.io/part-of: gitops
spec:
  terraformVersion: "1.9.0"

  # TODO: Update to your repo and path
  terraformModule:
    source: https://github.com/REPLACE_ORG/REPLACE_REPO.git//gitops/terraform?ref=main

  # Kubernetes backend — state stored as K8s secret
  backend: |-
    terraform {
      backend "kubernetes" {
        secret_suffix     = "gitops-infra"
        in_cluster_config = true
        namespace         = "gitops-system"
      }
    }

  taskOptions:
    - for:
        - "*"
      env:
        # TODO: Set your values
        - name: TF_VAR_location
          value: "swedencentral"
        - name: TF_VAR_environment
          value: "dev"
        - name: TF_VAR_project_name
          value: "REPLACE_WITH_PROJECT_NAME"
        - name: ARM_SUBSCRIPTION_ID
          value: "REPLACE_WITH_SUBSCRIPTION_ID"
        - name: ARM_TENANT_ID
          value: "REPLACE_WITH_TENANT_ID"
        - name: ARM_USE_OIDC
          value: "true"
      serviceAccount: terraform-runner
      labels:
        azure.workload.identity/use: "true"

  ignoreDelete: true
  scmAuthMethods: []
