apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
  namespace: workloads
  labels:
    app.kubernetes.io/name: example-app
    app.kubernetes.io/part-of: gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: example-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: example-app
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
          env:
            # TF outputs are available via the ConfigMap
            - name: EXAMPLE_OUTPUT
              valueFrom:
                configMapKeyRef:
                  name: gitops-tf-outputs
                  key: resource_group_name
                  optional: true
