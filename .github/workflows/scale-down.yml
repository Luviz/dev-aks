name: Scale Down (Minimal Cost)

on:
  workflow_dispatch:
  schedule:
    # 22:00 CET/CEST — two crons to handle DST
    - cron: "0 20 * * 1-5" # CEST (summer): 22:00 CEST = 20:00 UTC
    - cron: "0 21 * * 1-5" # CET  (winter): 22:00 CET  = 21:00 UTC

permissions:
  id-token: write
  contents: read

jobs:
  scale-down:
    runs-on: ubuntu-latest
    environment: luviz-dev-MPN
    steps:
      - name: Check CET/CEST timezone
        if: github.event_name == 'schedule'
        run: |
          OFFSET=$(TZ=Europe/Stockholm date +%z)
          HOUR_UTC=$(date -u +%H)
          if [[ "$OFFSET" == "+0200" && "$HOUR_UTC" != "20" ]]; then
            echo "Not CEST trigger hour — skipping"; exit 1
          fi
          if [[ "$OFFSET" == "+0100" && "$HOUR_UTC" != "21" ]]; then
            echo "Not CET trigger hour — skipping"; exit 1
          fi
          echo "Timezone offset=$OFFSET, UTC hour=$HOUR_UTC — proceeding"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Stop AKS Cluster
        run: |
          CLUSTER_NAME="${{ vars.AKS_CLUSTER_NAME }}"
          RG="${{ vars.AKS_RESOURCE_GROUP }}"

          echo "==> Stopping AKS cluster: $CLUSTER_NAME in $RG"
          az aks stop \
            --resource-group "$RG" \
            --name "$CLUSTER_NAME" \
            --no-wait

          echo "## Scale Down Complete 💤" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "AKS cluster \`$CLUSTER_NAME\` is stopping." >> $GITHUB_STEP_SUMMARY
          echo "VNet, ACR, and state are preserved." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run **Scale Up** to resume." >> $GITHUB_STEP_SUMMARY
