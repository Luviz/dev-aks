name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "dev"
        type: choice
        options:
          - dev

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: luviz-dev-MPN
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Generate config files
        run: |
          mkdir -p backend
          cat > backend/ci.tfvars <<EOF
          resource_group_name  = "${{ vars.TFSTATE_RESOURCE_GROUP || 'rg-dev-we-tfstate' }}"
          storage_account_name = "${{ vars.TFSTATE_STORAGE_ACCOUNT }}"
          container_name       = "tfstate"
          key                  = "dev-aks.tfstate"
          EOF

          cat > terraform.tfvars <<EOF
          environment         = "dev"
          location            = "westeurope"
          location_short      = "we"
          resource_group_name = "${{ vars.AKS_RESOURCE_GROUP }}"
          tenant_id           = "${{ vars.AZURE_TENANT_ID }}"
          argocd_admin_email  = "${{ vars.ARGOCD_ADMIN_EMAIL || 'bardiajedi@gmail.com' }}"
          argocd_admin_object_id = "${{ vars.ARGOCD_ADMIN_OBJECT_ID || '' }}"
          EOF

      - name: Build Helm chart dependencies
        run: |
          helm dependency update ../helm/argocd
          helm dependency update ../helm/envoy-gateway
          helm dependency update ../helm/argocd-apps 2>/dev/null || true

      - name: Terraform Init
        run: terraform init -backend-config=backend/ci.tfvars -input=false

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Get AKS Credentials
        run: |
          CLUSTER_NAME=$(terraform output -raw aks_cluster_name)
          RG=$(terraform output -raw aks_resource_group)
          az aks get-credentials --resource-group "$RG" --name "$CLUSTER_NAME" --overwrite-existing

      - name: Wait for Argo CD
        run: |
          echo "Waiting for Argo CD pods..."
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=argocd-server \
            -n argocd \
            --timeout=300s

      - name: Wait for Envoy Gateway sync
        run: |
          echo "Waiting for Argo CD to sync Envoy Gateway..."
          for i in $(seq 1 60); do
            HEALTH=$(kubectl get application envoy-gateway -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || true)
            SYNC=$(kubectl get application envoy-gateway -n argocd \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || true)
            echo "Attempt $i/60 — health=$HEALTH sync=$SYNC"
            if [[ "$HEALTH" == "Healthy" && "$SYNC" == "Synced" ]]; then
              break
            fi
            sleep 10
          done

      - name: Get Envoy Gateway LB IP
        id: lb_ip
        run: |
          for i in $(seq 1 30); do
            LB_IP=$(kubectl get svc -n envoy-gateway \
              -l gateway.envoyproxy.io/owning-gateway-name=default-gateway \
              -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [[ -n "$LB_IP" && "$LB_IP" != "null" ]]; then
              echo "ip=$LB_IP" >> $GITHUB_OUTPUT
              break
            fi
            echo "Attempt $i/30 — waiting 10s..."
            sleep 10
          done
          if [[ -z "$LB_IP" || "$LB_IP" == "null" ]]; then
            echo "::warning::Could not get Envoy Gateway LB IP"
          fi

      - name: Re-authenticate Azure (token refresh)
        if: steps.lb_ip.outputs.ip != ''
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Update Front Door origin with LB IP
        if: steps.lb_ip.outputs.ip != ''
        run: |
          LB_IP="${{ steps.lb_ip.outputs.ip }}"
          AFD_PROFILE=$(terraform output -raw frontdoor_profile_name)
          AFD_ORIGIN_GROUP=$(terraform output -raw frontdoor_origin_group_name)
          AFD_ORIGIN=$(terraform output -raw frontdoor_origin_name)
          RG=$(terraform output -raw aks_resource_group)

          ARGOCD_HOST=$(terraform output -raw argocd_custom_hostname)

          echo "==> Updating Front Door origin to ${LB_IP}..."
          az afd origin update \
            --resource-group "$RG" \
            --profile-name "$AFD_PROFILE" \
            --origin-group-name "$AFD_ORIGIN_GROUP" \
            --origin-name "$AFD_ORIGIN" \
            --host-name "$LB_IP" \
            --origin-host-header "$ARGOCD_HOST" \
            --only-show-errors

      - name: Configure Argo CD with Front Door URL
        if: steps.lb_ip.outputs.ip != ''
        run: |
          ARGOCD_HOSTNAME=$(terraform output -raw argocd_custom_hostname)
          ARGOCD_URL="https://${ARGOCD_HOSTNAME}"

          # Patch Argo CD configmap with custom domain URL
          echo "==> Patching Argo CD configmap with URL: ${ARGOCD_URL}"
          kubectl -n argocd patch configmap argocd-cm \
            --type merge -p "{\"data\":{\"url\":\"${ARGOCD_URL}\"}}"

          # Enable HTTPRoute with custom hostname
          echo "==> Enabling HTTPRoute for Argo CD..."
          helm dependency update ../helm/argocd
          helm upgrade argocd ../helm/argocd \
            --namespace argocd \
            --reuse-values \
            --set "route.enabled=true" \
            --set "route.host=${ARGOCD_HOSTNAME}" \
            --set "argo-cd.global.domain=${ARGOCD_HOSTNAME}" \
            --wait --timeout 5m

          echo "==> Post-deploy complete: ${ARGOCD_URL}"

      - name: Summary
        run: |
          LB_IP="${{ steps.lb_ip.outputs.ip }}"
          ARGOCD_HOSTNAME=$(terraform output -raw argocd_custom_hostname)
          AFD_HOSTNAME=$(terraform output -raw frontdoor_endpoint_hostname)

          echo "## Deployment Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| AKS Cluster | \`$(terraform output -raw aks_cluster_name)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Argo CD | https://${ARGOCD_HOSTNAME} |" >> $GITHUB_STEP_SUMMARY
          echo "| Front Door (default) | https://${AFD_HOSTNAME} |" >> $GITHUB_STEP_SUMMARY
          echo "| ACR | \`$(terraform output -raw acr_login_server)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Origin LB IP | \`${LB_IP}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### DNS Delegation (Cloudflare)" >> $GITHUB_STEP_SUMMARY
          echo "Add these NS records for \`$(terraform output -raw dns_zone_nameservers | head -1 | xargs echo)\`:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          terraform output -json dns_zone_nameservers | jq -r '.[]' >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
