name: Clean (Terraform Destroy)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'CLEAN' to confirm destruction of all Terraform-managed resources"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  clean:
    runs-on: ubuntu-latest
    environment: luviz-dev-MPN
    if: inputs.confirm == 'CLEAN'
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Generate config files
        run: |
          cat > backend.auto.tfvars <<EOF
          resource_group_name  = "${{ vars.TFSTATE_RESOURCE_GROUP || 'rg-dev-we-tfstate' }}"
          storage_account_name = "${{ vars.TFSTATE_STORAGE_ACCOUNT }}"
          container_name       = "tfstate"
          key                  = "dev-aks.tfstate"
          EOF

          cat > terraform.tfvars <<EOF
          environment         = "dev"
          location            = "westeurope"
          location_short      = "we"
          resource_group_name = "${{ vars.AKS_RESOURCE_GROUP }}"
          tenant_id           = "${{ vars.AZURE_TENANT_ID }}"
          argocd_admin_email  = "${{ vars.ARGOCD_ADMIN_EMAIL || 'bardiajedi@gmail.com' }}"
          argocd_admin_object_id = "${{ vars.ARGOCD_ADMIN_OBJECT_ID || '' }}"
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.auto.tfvars -input=false

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -auto-approve \
            -input=false

      - name: Summary
        run: |
          echo "## Clean Complete 🧹" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All Terraform-managed resources have been destroyed." >> $GITHUB_STEP_SUMMARY
          echo "Bootstrap resources (tfstate storage, managed identity) are preserved." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run **Deploy** to recreate everything." >> $GITHUB_STEP_SUMMARY
