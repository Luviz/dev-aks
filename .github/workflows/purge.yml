name: Purge (Nuclear Reset)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'PURGE' to confirm complete destruction including state"
        required: true
        type: string
      subscription_id:
        description: "Azure Subscription ID"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ inputs.subscription_id }}

jobs:
  purge:
    runs-on: ubuntu-latest
    environment: luviz-dev-MPN
    if: inputs.confirm == 'PURGE'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ inputs.subscription_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      # Step 1: Destroy Terraform resources
      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="./backend/dev.tfvars" -input=false
        continue-on-error: true

      - name: Terraform Destroy
        working-directory: terraform
        run: |
          terraform destroy \
            -var-file="dev.tfvars" \
            -auto-approve \
            -input=false || echo "Terraform destroy failed or no state — continuing with purge"

      # Step 2: Delete the terraform state blob
      - name: Purge Terraform State
        run: |
          echo "==> Deleting terraform state..."
          az storage blob delete \
            --account-name "${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            --container-name tfstate \
            --name dev-aks.tfstate \
            --auth-mode login \
            --only-show-errors || echo "State blob not found — skipping"

          # Also delete any lease
          az storage blob lease break \
            --account-name "${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            --container-name tfstate \
            --blob-name dev-aks.tfstate \
            --auth-mode login \
            --only-show-errors 2>/dev/null || true

      # Step 3: Optionally delete the workspace resource group
      - name: Delete Workspace Resource Group
        run: |
          RG="${{ vars.AKS_RESOURCE_GROUP }}"
          echo "==> Deleting resource group: $RG"
          az group delete --name "$RG" --yes --no-wait || echo "Resource group not found"

      - name: Summary
        run: |
          echo "## Purge Complete ☢️" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Everything has been destroyed**, including:" >> $GITHUB_STEP_SUMMARY
          echo "- All Terraform-managed resources" >> $GITHUB_STEP_SUMMARY
          echo "- Terraform state file" >> $GITHUB_STEP_SUMMARY
          echo "- Workspace resource group" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To start fresh, run **Bootstrap** first, then **Deploy**." >> $GITHUB_STEP_SUMMARY
