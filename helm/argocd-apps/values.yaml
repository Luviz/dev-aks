# Git source for the helm charts in this repo
repoURL: ""      # set dynamically: https://github.com/<org>/<repo>.git
targetRevision: main

# Envoy Gateway application
envoyGateway:
  enabled: true
  namespace: envoy-gateway
  path: helm/envoy-gateway

# GitOps applications (infra-terraform + workloads)
gitopsApps:
  enabled: true
  namespace: argocd
  path: gitops/applications

# Terraform Operator (CRD-based TF management)
terraformOperator:
  enabled: true
  namespace: tf-system
  path: helm/terraform-operator
