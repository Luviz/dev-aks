gateway:
  enabled: true
  className: default-gateway-class
  name: default-gateway

  listeners:
    - name: http
      protocol: HTTP
      port: 80
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: gateway-tls
      hostname: "*.nip.io"

  # Allow routes from all namespaces
  allowedRoutesFrom: All

  # Azure LoadBalancer annotations
  serviceAnnotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
